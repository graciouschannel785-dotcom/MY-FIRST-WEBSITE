<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="x-UA-compatible" content="IE-edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Ludiflex</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="account.css">
    <link rel="shortcut icon" href="./IMAGE/login-svgrepo-com.svg" type="image/x-icon">
</head>
<body>
    <!-- cerating a login account-->
     <div class="container">
        <div class="login-box">
            <div class="header-img">
                <img src="IMAGE/Exceolent png.png" alt="">
            </div>
            <div class="header-text">
                <p>login</p>
            </div>
            <div class="input-group">
                <input type="text" class="input-fied" id="username" required>
                <label for="username">Username</label>
            </div>
            <div class="input-group">
                <input type="password" class="input-fied" id="password" required>
                <label for="password">Password</label>
            </div>
            <div class="forgot-pass">
                <a href="#">forgot password?</a>
            </div>
            <div class="input-group">
                <button class="input-submit">Login <i class="bx-bx-log-in"></i></button>   
            </div>
        </div>
     </div>
    
</body>
</html>
